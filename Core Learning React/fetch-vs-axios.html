<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fetch vs Axios</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios@1.13.6/dist/axios.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const App = () => {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(false);
      const [method, setMethod] = useState("");
      const [error, setError] = useState(null);
      const URL = "https://jsonplaceholder.typicode.com/users";

      const fetchUsers = async () => {
        setLoading(true);
        setError(null);
        setMethod("Fetch API");

        try {
          const response = await fetch(URL);

          if (!response.ok)
            throw new Error("Request error");

          const data = await response.json();
          setUsers(data);
        } catch (err) {
          setError(err.message);
        };
        setLoading(false);
      };

      const axiosUsers = async () => {
        setLoading(true);
        setError(null);
        setMethod("Axios");

        try {
          const response = await axios.get(URL);
          setUsers(response.data);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <h1>Fetch vs Axios</h1>
          <button onClick={fetchUsers}> Search with Fetch </button>
          <button onClick={axiosUsers}> Search with Axios </button>

          {method && (<p>Searched by: <strong>{method}</strong></p>)}
          {loading && <p>Loading...</p>}
          {error && <p style={{ color: "red" }}>{error}</p>}

          <ul>
            {users.map(user => (
              <li key={user.id}>{user.name} — {user.email}</li>
            ))}
          </ul>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
