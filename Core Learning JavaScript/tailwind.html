<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const App = () => {
      const [count, setCount] = useState(0);
      const [dark, setDark] = useState(true);

      return (
        <div className={`${dark ? "bg-gray-800 text-white" : "bg-white text-gray-900"} p-8 rounded-2xl shadow-2xl w-96 text-center transition-all duration-300`}>
          <h1 className="text-2xl font-bold mb-4">React and Tailwind</h1>
          <p className="mb-6 text-sm opacity-70">directly in the browser</p>
          <div className="flex justify-center gap-4 mb-6">
            <button onClick={() => setCount(count + 1)} className="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-xl transition">
              Click count
            </button>
            <button onClick={() => setDark(!dark)} className="bg-purple-500 hover:bg-purple-600 px-4 py-2 rounded-xl transition">
              Toggle theme
            </button>
          </div>
          <p className="text-green-400 font-semibold">Clicks: {count}</p>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
</html>
